name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Catches a lockfile that installs on macOS but breaks `npm ci` on linux
      # (pruned @emnapi peer nodes) with an actionable message, before npm's cryptic EUSAGE.
      - run: node scripts/check-lockfile.ts

      - run: npm ci

      # Type-check (svelte-check + tsc across the app/node/logic projects), then the unit suite.
      # The bestiary corpus tests self-skip here — `_pf2e-source` is a local-only dev symlink.
      # e2e is excluded by design: it needs a licensed Foundry install + world, not available in CI.
      - run: npm run check
      - run: npm run test
